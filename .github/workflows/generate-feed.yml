name: Generate feed.json

on:
  push:
    paths:
      - 'metadata.csv'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run feed generator
        env:
          MUX_TOKEN_ID: ${{ secrets.MUX_TOKEN_ID }}
          MUX_TOKEN_SECRET: ${{ secrets.MUX_TOKEN_SECRET }}
        run: node generate-feed.js

      - name: Push feed.json via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTENT=$(base64 -w 0 feed.json)
          SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/MattiDucati/own-boku-feed/contents/feed.json \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))")
          curl -s -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/MattiDucati/own-boku-feed/contents/feed.json \
            -d "{\"message\":\"chore: regenerate feed.json [skip ci]\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}"
